<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DecPKI — Login Demo</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 640px; margin: 40px auto; padding: 0 16px; }
    h1 { font-size: 1.4rem; }
    label { display: block; margin-top: 12px; font-size: 0.85rem; color: #555; }
    input[type="text"] { width: 100%; box-sizing: border-box; padding: 8px; font-size: 1rem; margin-top: 4px; }
    .btn-row { margin-top: 16px; display: flex; gap: 8px; flex-wrap: wrap; }
    button { padding: 8px 16px; font-size: 0.9rem; cursor: pointer; }
    button:disabled { opacity: 0.5; cursor: default; }
    #status { margin-top: 20px; padding: 12px; background: #f5f5f5; border-radius: 4px; font-size: 0.9rem; white-space: pre-wrap; word-break: break-all; min-height: 60px; }
    #status.error { background: #fff0f0; color: #c00; }
    #status.ok { background: #f0fff0; }
    nav { margin-bottom: 24px; font-size: 0.85rem; }
    nav a { margin-right: 12px; }
  </style>
</head>
<body>
  <nav>
    <a href="/index.html">Home</a>
    <a href="/register.html">Register</a>
    <a href="/login.html">Login</a>
  </nav>
  <h1>DecPKI Login Demo</h1>

  <label for="didInput">DID (from registration)</label>
  <input type="text" id="didInput" placeholder="did:local:xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx">

  <div class="btn-row">
    <button id="btnLogin">Log In</button>
    <button id="btnVerify" disabled>Call Protected Endpoint</button>
    <button id="btnLogout" disabled>Log Out</button>
  </div>

  <div id="status">Enter your DID and click Log In.</div>

  <script type="module">
    import { DecPKISession, LoginCancelledError, LoginFailedError, DIDNotFoundError, SessionExpiredError }
      from '/src/session.js';

    const BFF_BASE = 'http://localhost:8000/login';
    const session = new DecPKISession({ bffBaseUrl: BFF_BASE });

    const didInput = document.getElementById('didInput');
    const btnLogin = document.getElementById('btnLogin');
    const btnVerify = document.getElementById('btnVerify');
    const btnLogout = document.getElementById('btnLogout');
    const status = document.getElementById('status');

    function setStatus(msg, cls = '') {
      status.className = cls;
      status.textContent = msg;
    }

    function updateButtons() {
      const loggedIn = session.isLoggedIn();
      btnVerify.disabled = !loggedIn;
      btnLogout.disabled = !loggedIn;
      btnLogin.disabled = loggedIn;
    }

    // Restore session on load
    if (session.isLoggedIn()) {
      const did = session.getDid();
      setStatus(`Logged in as ${did}`, 'ok');
      updateButtons();
    }

    btnLogin.addEventListener('click', async () => {
      const did = didInput.value.trim();
      if (!did) { setStatus('Please enter a DID.', 'error'); return; }
      btnLogin.disabled = true;
      setStatus('Starting WebAuthn…');
      try {
        const result = await session.login(did);
        const exp = new Date(result.expiresAt * 1000).toLocaleTimeString();
        setStatus(`Logged in as ${result.did}\nSession expires: ${exp}\nToken: ${result.sessionToken}`, 'ok');
        updateButtons();
      } catch (e) {
        if (e instanceof LoginCancelledError) setStatus('Login cancelled by user.', 'error');
        else if (e instanceof DIDNotFoundError) setStatus('DID not found — have you registered?', 'error');
        else setStatus(`Login failed: ${e.message}`, 'error');
        btnLogin.disabled = false;
      }
    });

    btnVerify.addEventListener('click', async () => {
      const token = await session.getToken();
      if (!token) { setStatus('No active session token.', 'error'); return; }
      try {
        const r = await fetch('/login/verify', {
          headers: { 'Authorization': `Bearer ${token}` },
        });
        const body = await r.json();
        if (r.ok) {
          setStatus(`Protected endpoint response:\n${JSON.stringify(body, null, 2)}`, 'ok');
        } else {
          setStatus(`Error ${r.status}: ${JSON.stringify(body)}`, 'error');
        }
      } catch (e) {
        setStatus(`Fetch error: ${e.message}`, 'error');
      }
    });

    btnLogout.addEventListener('click', async () => {
      await session.logout();
      setStatus('Logged out.');
      updateButtons();
      btnLogin.disabled = false;
    });
  </script>
</body>
</html>
